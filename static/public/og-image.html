<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }
  .bg {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #3b82c8 0%, #5a9fd4 50%, #7ab8e0 100%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    position: relative;
  }
  .bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .card {
    background: white;
    border-radius: 32px;
    padding: 48px 64px;
    display: flex;
    align-items: center;
    gap: 48px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
    max-width: 1050px;
  }
  .logo {
    width: 220px;
    height: auto;
    flex-shrink: 0;
  }
  .text {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tagline {
    font-size: 22px;
    color: #6889a5;
    font-weight: 500;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
  }
  .feature {
    background: #eaf1f8;
    color: #3b82c8;
    font-size: 16px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="card">
      <img src="logo.png" class="logo" alt="">
      <div class="text">
        <div class="tagline">Printable worksheets for Pre-K through 5th grade</div>
        <div class="features">
          <span class="feature">Math</span>
          <span class="feature">Fractions</span>
          <span class="feature">Telling Time</span>
          <span class="feature">Spelling</span>
          <span class="feature">Sight Words</span>
          <span class="feature">Tracing</span>
          <span class="feature">Mazes</span>
          <span class="feature">Logic Puzzles</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
